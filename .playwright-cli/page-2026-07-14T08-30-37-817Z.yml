    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is European Classic interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "European Classic design draws from the shared domestic language of French apartments, English townhouses and Italian palazzi: paneled walls, ordered openings, natural stone, parquet floors and furniture with visible lineage. It is not one strict period. The coherence comes from proportion and material quality rather than from copying a historical room intact."
        - paragraph [ref=e88]: The most convincing spaces establish a calm architectural frame, then place a few darker, older objects within it. Patina is welcome, but wear should feel genuine rather than manufactured. Ornament has a job—marking an opening, framing a wall or completing a cornice—so the room remains legible even when individual pieces are decorative.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Establish the frame
          - paragraph [ref=e92]: Align doors, panels, lighting and major furniture before considering decorative objects.
        - generic [ref=e93]:
          - generic [ref=e94]: Mix by quality, not country
          - paragraph [ref=e95]: French, English and Italian pieces can coexist when scale, wood tone and craftsmanship relate.
        - generic [ref=e96]:
          - generic [ref=e97]: Leave evidence of age
          - paragraph [ref=e98]: A softened stone edge or mellow walnut surface gives the room credibility that new distressed finishes cannot.
