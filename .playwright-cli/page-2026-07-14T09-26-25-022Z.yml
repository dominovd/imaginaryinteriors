      - generic [ref=e85]:
        - heading "What is Victorian interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: Victorian interior design reflects the long, inventive period from 1837 to 1901 rather than one fixed look. Industrial production broadened access to wallpaper, tile, cast iron, upholstery and furniture, while expanding trade brought new woods, dyes and decorative influences into the home. The result was layered, but rooms still followed a clear social and functional order.
        - paragraph [ref=e88]: A useful modern interpretation keeps that appetite for color, pattern and collections while editing density. Deep wall color, a patterned floor and substantial timber furniture can carry the character; every lamp, frame and cushion does not need fringe. Unlike Gothic design, Victorian style is domestic and eclectic first—pointed arches and medieval motifs are only one possible strand.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Layer by plane
          - paragraph [ref=e92]: Give floor, wall and upholstery different scales of pattern so they read as an ordered stack rather than visual noise.
        - generic [ref=e93]:
          - generic [ref=e94]: Furnish for rituals
          - paragraph [ref=e95]: A reading chair, writing desk, washstand or hall chair should explain how the room is used.
        - generic [ref=e96]:
          - generic [ref=e97]: Let light relieve color
          - paragraph [ref=e98]: Keep windows bright and use shaded lamps at several heights; deep hues need luminous edges.
