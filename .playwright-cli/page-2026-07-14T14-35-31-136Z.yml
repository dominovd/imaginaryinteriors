    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Gothic interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Gothic interior design translates the structural language of medieval European architecture into domestic space: pointed arches, vertical proportions, deep openings, ribbed forms, carved timber and leaded glass. Most homes use the later Gothic Revival interpretation, where those references appear in joinery, furniture and surface detail rather than in cathedral-scale construction."
        - paragraph [ref=e88]: The style is defined by direction and contrast, not by black paint. A dark oak portal against pale lime plaster, a tall window carrying daylight deep into the room or a high-backed chair repeating a lancet shape can establish the idea. This architectural focus separates Gothic from Victorian eclecticism and from theatrical haunted-house styling.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Use one vertical rhythm
          - paragraph [ref=e92]: Repeat a pointed or elongated proportion across openings, shelves and furniture without tracing every surface.
        - generic [ref=e93]:
          - generic [ref=e94]: Carve where hands meet
          - paragraph [ref=e95]: Concentrate craft on doors, benches, handles and case furniture rather than applying motifs as flat decoration.
        - generic [ref=e96]:
          - generic [ref=e97]: Design the shadow
          - paragraph [ref=e98]: Combine pale walls, deep timber reveals and focused lamps so relief remains visible throughout the day.
