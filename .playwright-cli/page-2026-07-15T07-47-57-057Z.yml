      - generic [ref=e85]:
        - heading "What is Art Nouveau interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: Art Nouveau emerged across Europe around 1890–1910 as designers sought a modern language rooted in nature and total design. Architecture, furniture, glass, metalwork and graphics were conceived together. Stems, wings and waves were abstracted into structural curves, often creating an asymmetrical composition that still feels balanced.
        - paragraph [ref=e88]: The style is more than floral imagery. Its strongest interiors carry one contour from a door frame into a cabinet, lamp or leaded-glass panel, with materials chosen to support the same movement. Unlike Art Deco, it favors supple growth over stepped geometry; unlike Victorian design, it aims for visual unity rather than an eclectic accumulation of objects and historical references.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Trace one continuous gesture
          - paragraph [ref=e92]: Choose an S-curve, stem or asymmetric arch and repeat its direction rather than copying a literal flower.
        - generic [ref=e93]:
          - generic [ref=e94]: Integrate, do not attach
          - paragraph [ref=e95]: Build the motif into a frame, handle, chair back or glass seam so ornament also explains construction.
        - generic [ref=e96]:
          - generic [ref=e97]: Leave calm intervals
          - paragraph [ref=e98]: Plain plaster and simple textiles make the crafted lines visible and prevent the room from becoming illustrative.
