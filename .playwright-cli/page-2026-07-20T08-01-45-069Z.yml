    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Bauhaus interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Bauhaus interior design grows from the German school active from 1919 to 1933, where art, craft, architecture and industrial production were taught as connected disciplines. Rooms were treated as systems for living: circulation, light, storage and repeated construction mattered more than inherited ornament. Workshops tested steel tube, plywood, glass, woven textiles and standardized components for modern manufacture."
        - paragraph [ref=e88]: The style is often reduced to primary colors and geometric art, but those are secondary tools. A convincing Bauhaus room first solves a practical problem with legible structure and economical material. Color may identify a door or balance a wall; it does not need to appear on every cabinet. This distinguishes Bauhaus from broader Modern interiors and from the warmer, more sculptural Mid-Century Modern tradition.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Map the activity first
          - paragraph [ref=e92]: Place sitting, working and storage zones according to movement and daylight before choosing visual accents.
        - generic [ref=e93]:
          - generic [ref=e94]: Make construction readable
          - paragraph [ref=e95]: Let frames, joints and edges show how furniture carries weight and can be reproduced or repaired.
        - generic [ref=e96]:
          - generic [ref=e97]: Give color a function
          - paragraph [ref=e98]: Use one saturated plane to mark an entrance, organize storage or correct visual balance.
