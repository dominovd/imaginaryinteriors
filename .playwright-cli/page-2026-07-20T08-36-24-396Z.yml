    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is rustic interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Rustic design draws character from materials that reveal how they were made and how they age: irregular stone, sawn or hewn timber, forged iron, lime plaster, leather and dense natural textiles. The architecture usually carries more visual weight than the accessories. Grain, tool marks, joints and softened edges supply the detail that polished rooms often add through ornament."
        - paragraph [ref=e88]: A convincing rustic room is sturdy but not necessarily dark, old or rural. Clear walkways, pale mineral walls and a limited number of large pieces keep heavy materials from feeling oppressive. The goal is useful permanence—a table that welcomes daily wear, a slate floor that tolerates boots and storage placed where life actually happens—not a staged imitation of a cabin.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Read the building first
          - paragraph [ref=e92]: Preserve a real beam, stone reveal or plank floor, then let new furniture support that element rather than compete with it.
        - generic [ref=e93]:
          - generic [ref=e94]: Choose mass deliberately
          - paragraph [ref=e95]: Use one thick table, bench or chest as an anchor and balance it with open space and visually lighter seating.
        - generic [ref=e96]:
          - generic [ref=e97]: Accept useful variation
          - paragraph [ref=e98]: Knots, mineral shifts and wear are valuable when the surface remains sound, cleanable and suited to its job.
