          - paragraph [ref=e108]: Pegged joints, thick lintels and forged hardware make assembly visible instead of disguising it behind trim.
        - generic [ref=e112]:
          - generic [ref=e113]: Material weight
          - paragraph [ref=e114]: Substantial timber and stone create permanence, while limewash and linen prevent the palette from becoming heavy.
        - generic [ref=e118]:
          - generic [ref=e119]: Honest signs of use
          - paragraph [ref=e120]: Patina belongs on contact points and working surfaces; random factory distressing does not tell a believable story.
        - generic [ref=e124]:
          - generic [ref=e125]: Practical restraint
          - paragraph [ref=e126]: Fewer, larger objects leave room for cooking, gathering, working and arriving with outdoor gear.
