    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Country interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: Country design is a broad domestic style built from familiar furniture, garden-informed color and textiles that make a room feel settled over time. Walnut or oak tables, painted cupboards, floral cotton, gingham, glazed ceramics and shaded lamps matter less as individual motifs than as parts of a relaxed, readable whole.
        - paragraph [ref=e88]: "Unlike Farmhouse, Country need not organize itself around agricultural work or utilitarian storage. It is more interested in furnished comfort: a floral sofa beside a checked chair, an antique desk made practical for current use, or a dresser that displays a small ceramic collection. Restraint comes from repeating colors while varying pattern scale, leaving floors and working surfaces visibly clear."
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Start with one patterned piece
          - paragraph [ref=e92]: Let a sofa, curtain or wallpaper establish the palette, then support it with one smaller check and generous solid color.
        - generic [ref=e93]:
          - generic [ref=e94]: Mix furniture by visual weight
          - paragraph [ref=e95]: Different periods can coexist when seat heights, timber depth and overall scale feel related.
        - generic [ref=e96]:
          - generic [ref=e97]: Create quiet between details
          - paragraph [ref=e98]: Plain plaster, painted lower walls and clear tabletops prevent collected objects from becoming visual noise.
