    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Tuscan interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Tuscan design reflects central Italian rural houses through materials that moderate heat and age visibly: lime plaster, handmade terracotta tile, local stone, dark walnut, linen and forged iron. Arches and deep openings shape the space, but the strongest rooms rely on material proportion rather than ornamental “Old World” effects."
        - paragraph [ref=e88]: The key challenge is temperature. Cotto, ochre and walnut can make every surface feel orange or heavy, so pale plaster, travertine, daylight and muted olive provide relief. This grounded contrast separates Tuscan interiors from the paler elegance of French Country and from the brighter coastal references of broader Mediterranean style.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Ground the room once
          - paragraph [ref=e92]: Let cotto or dark timber provide the main warm field; do not repeat both at maximum intensity everywhere.
        - generic [ref=e93]:
          - generic [ref=e94]: Use plaster as light
          - paragraph [ref=e95]: Warm limewash reflects daylight and gives heavy wood and iron enough breathing room.
        - generic [ref=e96]:
          - generic [ref=e97]: Edit the ironwork
          - paragraph [ref=e98]: Choose one pendant, rail or set of hooks with simple forged geometry instead of scrollwork on every object.
