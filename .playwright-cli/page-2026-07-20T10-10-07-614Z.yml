      - generic [ref=e85]:
        - heading "What is cabin interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Cabin design begins with shelter: a compact plan, a clear relationship to the outdoors and materials that can handle weather, gear and repeated use. Timber gives warmth, but storage, drying space, durable floors and furniture that earns its footprint are what make the interior work."
        - paragraph [ref=e88]: The strongest cabins are not miniature lodges. They keep visual weight near the floor, build functions into walls and let one view or heat source organize the room. Pale pine, charcoal wool, slate and quiet moss green create atmosphere without relying on antlers, plaid overload or novelty signs.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Design the arrival first
          - paragraph [ref=e92]: Give wet footwear, outerwear and firewood a defined landing zone before furnishing the living room.
        - generic [ref=e93]:
          - generic [ref=e94]: Spend the perimeter
          - paragraph [ref=e95]: Use built-in benches, bed drawers and shallow cupboards so the center of a small plan remains open.
        - generic [ref=e96]:
          - generic [ref=e97]: Control the timber
          - paragraph [ref=e98]: Choose one dominant wood and interrupt it with dark flooring, pale textile and framed views.
