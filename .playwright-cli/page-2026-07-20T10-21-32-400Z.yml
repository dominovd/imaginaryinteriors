    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Cottagecore interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Cottagecore translates an ideal of slower domestic life into rooms for cooking, growing, reading, repairing and gathering. Its character comes from evidence of use: an old table with a sound frame, linen that can be mended, garden tools near the back door and pottery made to be handled."
        - paragraph [ref=e88]: Florals can belong, but they are not the foundation. Quiet plaster, faded paint and warm oak create enough calm for a quilt, botanical print or garden posy to feel personal. This keeps Cottagecore distinct from polished Grandmillennial pattern and from the workmanlike architecture of Farmhouse style.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Begin with an activity
          - paragraph [ref=e92]: Design a place to bake, mend, pot seedlings or read before adding objects that merely symbolize those activities.
        - generic [ref=e93]:
          - generic [ref=e94]: Keep age credible
          - paragraph [ref=e95]: Mix one or two genuinely old pieces with simple new basics instead of distressing every surface.
        - generic [ref=e96]:
          - generic [ref=e97]: Give pattern a boundary
          - paragraph [ref=e98]: Concentrate florals on one quilt, chair or curtain and let surrounding linen stay quiet.
