      - generic [ref=e85]:
        - heading "What is Coastal interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Coastal design responds to the conditions around the shore: intense daylight, views, moving air, wet towels and sand carried indoors. Pale mineral surfaces and light timber support that response, while shutters, screens and washable fabrics make the room comfortable beyond the photograph."
        - paragraph [ref=e88]: Blue is optional and white needs warmth. A successful palette uses chalk, limestone and bleached oak as the field, then adds a small sea-glass or ink note for depth. This is lighter and more architectural than Coastal Grandmother, less regionally historic than Mediterranean and far more restrained than Tropical style.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Filter before decorating
          - paragraph [ref=e92]: Control glare with exterior screens, shutters or lined curtains before choosing pale upholstery.
        - generic [ref=e93]:
          - generic [ref=e94]: Plan the sandy route
          - paragraph [ref=e95]: Connect the outdoor door, rinse point, towel storage and hard floor without crossing the main seating area.
        - generic [ref=e96]:
          - generic [ref=e97]: Warm the white
          - paragraph [ref=e98]: Use limestone, pale oak and natural weave so chalk walls feel dimensional rather than clinical.
