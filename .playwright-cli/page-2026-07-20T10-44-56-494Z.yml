      - generic [ref=e85]:
        - heading "What is Coastal Grandmother interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Coastal Grandmother style imagines an easy, well-kept seaside home organized around ordinary pleasures: reading by a window, preparing lunch, setting a table and welcoming someone without ceremony. Traditional furniture gives the rooms familiarity, while linen covers, wicker and faded color stop them from feeling formal."
        - paragraph [ref=e88]: "The name describes an attitude, not the owner’s age. Rooms should feel accumulated but selective: one old pine table, books within reach, a pottery lamp and cloth that improves with washing. Compared with Coastal style, the architecture recedes and the furnishing becomes warmer, softer and more personal."
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Test the comfort
          - paragraph [ref=e92]: Choose seat depth, arm height and reading light before deciding whether a chair looks appropriately relaxed.
        - generic [ref=e93]:
          - generic [ref=e94]: Mix age with restraint
          - paragraph [ref=e95]: Let one old pine or painted piece carry patina; keep newer upholstery plain and well fitted.
        - generic [ref=e96]:
          - generic [ref=e97]: Repeat color loosely
          - paragraph [ref=e98]: Echo faded blue or sage in two or three materials without buying a coordinated set.
