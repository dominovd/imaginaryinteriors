      - generic [ref=e85]:
        - heading "What is Tropical interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Tropical design is strongest when it responds to warm, humid conditions: deep roof shade, generous cross-ventilation, insect screens, ceiling fans and materials selected for moisture and frequent use. Greenery then extends the architecture instead of compensating for a sealed room."
        - paragraph [ref=e88]: There is no single universal tropical tradition, so avoid reducing the style to “exotic” objects or borrowed motifs. A disciplined contemporary room can use warm plaster, dark stone, timber and cane with just one living green layer. The result is richer than Coastal, calmer than Bohemian and less historically specific than Mediterranean style.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Shade the opening
          - paragraph [ref=e92]: Use eaves, screens or adjustable louvers to stop heat before relying on curtains inside the room.
        - generic [ref=e93]:
          - generic [ref=e94]: Protect the air route
          - paragraph [ref=e95]: Keep tall storage and dense planting away from the path between operable openings.
        - generic [ref=e96]:
          - generic [ref=e97]: Limit the green sources
          - paragraph [ref=e98]: Choose a garden view and one indoor specimen before adding patterned leaves or more pots.
