    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Vintage interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: Vintage interior design uses older furniture, lighting, art and textiles as working parts of a current home. It is not one historical style. Coherence comes from choosing a lead period, repeating its proportions and materials, then allowing a small number of earlier, later or contemporary pieces to support daily life.
        - paragraph [ref=e88]: Condition matters more than theatrical age. Faded color, softened brass and a repaired veneer edge can be valuable patina; loose joints, unsafe wiring and persistent odors are faults to address. The most convincing rooms integrate a good mattress, ergonomic chair and discreet appliances without forcing those essentials to impersonate the past.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Set a date range
          - paragraph [ref=e92]: Choose one anchor decade and allow most furniture to fall within roughly one generation around it.
        - generic [ref=e93]:
          - generic [ref=e94]: Separate patina from damage
          - paragraph [ref=e95]: Keep stable wear and color variation; repair loose joints, lifting veneer, wiring and compromised upholstery.
        - generic [ref=e96]:
          - generic [ref=e97]: Modernize invisibly
          - paragraph [ref=e98]: Let mattresses, task chairs, appliances and lighting performance be current while their visual presence stays quiet.
