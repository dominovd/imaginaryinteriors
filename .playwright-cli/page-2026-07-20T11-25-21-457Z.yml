    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Shabby Chic interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Shabby Chic combines pale, comfortable rooms with furniture and textiles that show softened age. Its character comes from contrast: a scrubbed pine table against chalky walls, loose linen beside a stable painted cabinet, or one faded floral among mostly plain fabrics. The room should feel eased by use, not manufactured to look neglected."
        - paragraph [ref=e88]: The style works best when wear is selective. Preserve thin paint, rounded edges and washed color on structurally sound pieces; repair loose joints, sharp chips and failing finishes. Current mattresses, task lighting and storage can remain visually quiet while delivering the comfort an older room often lacks.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Limit visible wear
          - paragraph [ref=e92]: Let one substantial cabinet, table or bed show patina while most surrounding surfaces remain calm.
        - generic [ref=e93]:
          - generic [ref=e94]: Build softness through cloth
          - paragraph [ref=e95]: Use washed linen, aged cotton and a modest faded weave instead of adding more decorative objects.
        - generic [ref=e96]:
          - generic [ref=e97]: Keep pink subordinate
          - paragraph [ref=e98]: Treat dusty rose as a small textile note; chalk, flax and wood should carry most of the room.
