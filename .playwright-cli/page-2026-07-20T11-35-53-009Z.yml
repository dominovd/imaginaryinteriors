    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Bohemian interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Bohemian interior design is an informal way of composing a home from meaningful textiles, useful older furniture, handmade materials and art gathered over time. It values personality over matching sets, but successful rooms still have rules: a repeated color thread, related furniture scale and enough empty floor and wall space for individual pieces to register."
        - paragraph [ref=e88]: The style is not shorthand for mixing unrelated cultural symbols. Provenance matters when buying craft, and abstract weave, material quality and personal history are stronger foundations than anonymous “tribal” decoration. Modern lighting, cable management and ergonomic seating can sit comfortably beside worn timber and handwoven cloth.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Choose one lead textile
          - paragraph [ref=e92]: Let a rug, blanket or curtain establish three or four colors, then draw smaller accents from it.
        - generic [ref=e93]:
          - generic [ref=e94]: Vary height, not quantity
          - paragraph [ref=e95]: Combine a low table, standard seating and one taller plant or lamp instead of filling every level.
        - generic [ref=e96]:
          - generic [ref=e97]: Buy craft with context
          - paragraph [ref=e98]: Prefer traceable makers and known materials; avoid treating sacred or culturally specific motifs as generic décor.
