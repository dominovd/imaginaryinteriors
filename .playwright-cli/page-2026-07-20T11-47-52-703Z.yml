    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Eclectic interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: Eclectic interior design deliberately combines furniture, art and lighting from different periods or design languages. It is not a license for random variety. A convincing room establishes a visual contract—perhaps repeated black outlines, related seat heights, one wood family or a limited palette—then uses a few clear departures to create energy.
        - paragraph [ref=e88]: "Contrast needs hierarchy. One major collision, such as a modern table under traditional molding, should lead; secondary pieces can echo its color or geometry without starting new conversations. Function still sets the limits: mixed dining chairs need compatible heights, an antique desk needs modern ergonomics and every route through the room must remain clear."
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Name the connector
          - paragraph [ref=e92]: Before buying, identify the color, line, proportion or material that will make the new piece belong.
        - generic [ref=e93]:
          - generic [ref=e94]: Create one lead contrast
          - paragraph [ref=e95]: Choose a single high-impact pairing and let other differences remain quieter.
        - generic [ref=e96]:
          - generic [ref=e97]: Match functional dimensions
          - paragraph [ref=e98]: Seat height, table clearance, lamp performance and storage depth matter even when styles differ.
