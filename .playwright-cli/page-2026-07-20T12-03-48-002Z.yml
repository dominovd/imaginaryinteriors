    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Global interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: Global interior design brings craft, furniture and textiles from identifiable places into a coherent present-day home. The strongest rooms are not geographic collages. They use a calm architectural base and a small number of objects whose maker, material, technique or region can be described accurately. Function and respect matter as much as visual impact.
        - paragraph [ref=e88]: A label such as “tribal” or “ethnic” is not useful provenance. Ask who made an item, where, with which fibers or clay, and whether the seller can explain its intended use. Avoid sacred, ceremonial or community-specific objects unless you understand the context and have a legitimate reason to care for them. Everyday weaving, pottery and joinery offer ample material depth without turning identity into decoration.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Record what you know
          - paragraph [ref=e92]: Keep maker, region, material and care information with important purchases instead of relying on vague style labels.
        - generic [ref=e93]:
          - generic [ref=e94]: Give craft visual space
          - paragraph [ref=e95]: One textile or vessel group needs a quiet wall or clear tabletop to be read as work, not inventory.
        - generic [ref=e96]:
          - generic [ref=e97]: Use before you display
          - paragraph [ref=e98]: Favor bowls, baskets, rugs and furniture that can serve their intended everyday purpose safely.
