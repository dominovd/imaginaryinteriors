    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Mediterranean interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: Mediterranean interior design is a broad family of regional traditions shaped by hot dry summers, strong sunlight and life between interior rooms, courtyards and terraces. Thick mineral walls, shutters, tile floors, timber and shaded openings are not decorative effects alone; they manage heat, glare, airflow and hard daily use.
        - paragraph [ref=e88]: Because the Mediterranean spans distinct places across Southern Europe, North Africa and the eastern basin, coherence begins with a regional anchor rather than a collage. A Balearic scheme might emphasize lime plaster, terracotta, chestnut and rush; another location will have different stone, joinery, ceramics and color. Borrow the climate logic and research the regional materials instead of combining every arch, tile and blue motif.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Choose a regional anchor
          - paragraph [ref=e92]: Name one place or material tradition and let it guide joinery, floor, pottery and color choices.
        - generic [ref=e93]:
          - generic [ref=e94]: Control sun at the opening
          - paragraph [ref=e95]: Use shutters, deep reveals, exterior shade and curtains before relying on dark glass or heavy cooling.
        - generic [ref=e96]:
          - generic [ref=e97]: Keep mineral surfaces breathable
          - paragraph [ref=e98]: Specify compatible lime-based finishes where the wall construction requires vapor movement.
