    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Moroccan interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: Moroccan interior design grows from several regional building and craft traditions rather than one decorative formula. In a Marrakesh riad, an inward-facing courtyard organizes daylight, air and privacy; a bent entrance delays the view from the street, while shaded rooms, galleries and roof terraces form a deliberate sequence.
        - paragraph [ref=e88]: Tadelakt, zellige and carved cedar are skilled building techniques, not interchangeable surface effects. Tadelakt makes continuous water-resistant lime planes, zellige brings precise geometry to selected fields and borders, and timber joinery gives openings weight. A current home can borrow these principles honestly when services stay quiet, craft is specified correctly and objects do not compete for attention.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Name the place and building type
          - paragraph [ref=e92]: A Marrakesh riad, Fez townhouse and coastal home do not share one palette or decorative script.
        - generic [ref=e93]:
          - generic [ref=e94]: Concentrate geometry
          - paragraph [ref=e95]: Use zellige as one field, dado or threshold instead of sprinkling small patterned moments around the room.
        - generic [ref=e96]:
          - generic [ref=e97]: Specify craft technically
          - paragraph [ref=e98]: Hire installers experienced with the substrate, curing, joints, sealing and maintenance each traditional finish requires.
