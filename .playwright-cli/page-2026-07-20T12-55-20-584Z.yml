    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Arabic interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Arabic interior design is not one historical style. Arabic-speaking regions span different climates, building traditions and domestic customs, so a useful scheme needs a named place and period. This guide uses a contemporary Gulf residence to show shared priorities that remain relevant: generous hospitality, family privacy, shaded transitions and careful control of strong daylight."
        - paragraph [ref=e88]: The majlis gives guests a comfortable reception space without exposing private rooms. Deep reveals, screens and indirect routes moderate heat and sightlines, while stone, timber, woven palm fiber and wool support daily use. Geometry belongs in joinery and filtered light rather than being repeated across every surface, and modern cooling, acoustics and lighting should be resolved as part of the architecture.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Choose a regional reference
          - paragraph [ref=e92]: Define the city, climate and household pattern before selecting arches, screens, textiles or stone.
        - generic [ref=e93]:
          - generic [ref=e94]: Separate guest and family routes
          - paragraph [ref=e95]: A reception room near the entrance can support hospitality while protecting the quieter domestic interior.
        - generic [ref=e96]:
          - generic [ref=e97]: Make screens perform
          - paragraph [ref=e98]: Size the pattern, depth and orientation for glare, privacy, ventilation and the actual view—not decoration alone.
