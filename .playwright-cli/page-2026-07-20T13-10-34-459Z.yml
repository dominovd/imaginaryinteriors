    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Asian Zen interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "“Asian Zen” is a popular editorial label, not a single regional design tradition. Asia contains many distinct cultures, and Zen itself is a Buddhist tradition rather than an aesthetic product. To keep the category useful and specific, this guide translates a contemporary Japanese-informed approach: rooms are orderly, adaptable and closely tuned to daylight, circulation and daily ritual."
        - paragraph [ref=e88]: The result is not simply an empty beige room. Sliding or translucent screens adjust privacy and glare, built-in storage removes visual noise, floor transitions mark how a space is used and natural materials make a small number of surfaces feel substantial. Comfort, acoustics, maintenance and modern climate control still matter; low furniture should support the body, and every “quiet” detail needs a practical reason.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Use a specific reference
          - paragraph [ref=e92]: Research one place, building type and material tradition instead of combining symbols from across Asia.
        - generic [ref=e93]:
          - generic [ref=e94]: Design empty space to work
          - paragraph [ref=e95]: Give circulation, doors and daily tasks enough clearance; emptiness should improve use rather than stage a photograph.
        - generic [ref=e96]:
          - generic [ref=e97]: Keep spiritual objects personal
          - paragraph [ref=e98]: Do not buy statues, altars or ritual objects as generic devices for making a room look calm.
