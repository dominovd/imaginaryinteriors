    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Southwestern interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: Southwestern interior design is a broad regional category shaped by the dry landscapes and layered building cultures of the American Southwest and northern Mexico. It should not be reduced to one Indigenous pattern, a cactus and turquoise accessories. For a clear working example, this guide uses a contemporary Sonoran Desert home near Tucson, where deep shade, thick mineral surfaces and sheltered outdoor rooms manage intense sun and daily temperature swings.
        - paragraph [ref=e88]: Earth-toned plaster, clay tile, mesquite, local stone and wool make a tactile base, but each material needs technical judgment. Earthen and lime finishes must suit the wall assembly and rainfall exposure; tile needs appropriate slip and sealing performance; timber should be responsibly sourced. Indigenous textiles and pottery belong only when maker, Nation or community, technique and source are known—not as anonymous style shorthand.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Name the desert region
          - paragraph [ref=e92]: Sonoran, Chihuahuan and high-desert environments differ in plants, temperature, rainfall and material traditions.
        - generic [ref=e93]:
          - generic [ref=e94]: Shade glass from outside
          - paragraph [ref=e95]: Use deep eaves, ramadas, shutters or exterior screens before relying on interior curtains to stop heat.
        - generic [ref=e96]:
          - generic [ref=e97]: Require real provenance
          - paragraph [ref=e98]: For Indigenous work, seek the artist, Nation or community, material, technique and an accountable selling source.
