    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Desert Modern interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: Desert Modern design uses contemporary architectural clarity to make extreme light, heat, wind and large daily temperature swings manageable. Long roof planes, selective glazing, exterior shade and a compact material palette create the visual identity; sand-colored finishes alone do not. This guide uses a current Mojave house as its frame, distinct from both historic Palm Springs modernism and regional adobe revival.
        - paragraph [ref=e88]: Rammed earth, concrete and stone can provide useful mass, but they are not automatically high-performance. Insulation, airtightness, thermal bridges, glazing specification, roof design and mechanical systems must be engineered for the site. Inside, oak, wool and muted clay soften the mineral shell while concealed storage and precise lighting prevent minimalism from becoming an empty showroom.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Model the sun before the view
          - paragraph [ref=e92]: Set opening size and overhang depth from orientation and seasonal solar exposure, not a desire for maximum glass.
        - generic [ref=e93]:
          - generic [ref=e94]: Separate mass from insulation
          - paragraph [ref=e95]: Specify a complete wall and roof assembly; heavy material alone does not guarantee comfort or low energy use.
        - generic [ref=e96]:
          - generic [ref=e97]: Keep the desert outside
          - paragraph [ref=e98]: Frame native landscape through the openings instead of staging indoor cacti, boulders and themed objects.
