    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is IKEA-inspired interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "IKEA-inspired design applies accessible Scandinavian ideas to the logistics of ordinary homes: standardized storage, flat-pack pieces, simple forms and furniture that can perform more than one job. The result should feel planned around the resident, not copied from a catalog. This is an independent design guide and is not affiliated with or endorsed by IKEA."
        - paragraph [ref=e88]: "Start with belongings, circulation and future moves, then choose a small family of compatible modules. Flat-pack construction has real limits: exposed board edges dislike moisture, fixings can loosen and some pieces tolerate repeated assembly better than others. Put more of the budget into the mattress, sofa, work chair, worktops and frequently used hardware; use color, lighting, art and secondhand pieces to prevent a generic showroom effect."
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Measure the route too
          - paragraph [ref=e92]: Record walls, skirting, sockets and door swings, then confirm that every package and assembled piece can reach its room.
        - generic [ref=e93]:
          - generic [ref=e94]: Choose a lifespan
          - paragraph [ref=e95]: Ask whether a system must survive one lease, repeated moves or a decade of daily use before deciding its material and price.
        - generic [ref=e96]:
          - generic [ref=e97]: Anchor tall furniture
          - paragraph [ref=e98]: Use suitable wall restraints and follow the manufacturer’s instructions, especially around children and uneven floors.
