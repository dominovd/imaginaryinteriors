    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Pottery Barn-inspired interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "Pottery Barn-inspired design is a relaxed American classic look built from generous seating, familiar furniture forms, warm timber and quiet natural textiles. The room feels established but not formal: a deep sofa may sit beside an older leather chair, a sturdy oak table and a faded rug rather than a perfectly matched suite. This is an independent editorial guide and is not affiliated with or endorsed by Pottery Barn."
        - paragraph [ref=e88]: Scale is the real discipline. Rolled arms, deep seats and substantial casegoods can overwhelm an average room, so measure the fully furnished footprint and preserve circulation before choosing color. Spend on the sofa frame, cushion resilience, upholstery performance and frequently handled hardware. Then introduce patina with vintage wood, real leather, wool and ceramic rather than simulated distressing across every surface.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Tape the full footprint
          - paragraph [ref=e92]: Mark the sofa, chair and table on the floor, including recline, drawers and the space needed to walk or pull out a seat.
        - generic [ref=e93]:
          - generic [ref=e94]: Read the upholstery spec
          - paragraph [ref=e95]: Match fiber, weave, cleaning code, seam placement and cushion fill to children, pets, sunlight and actual daily use.
        - generic [ref=e96]:
          - generic [ref=e97]: Vary age, not quality
          - paragraph [ref=e98]: Combine one genuinely worn or vintage piece with simpler new furniture instead of applying the same artificial distress to everything.
