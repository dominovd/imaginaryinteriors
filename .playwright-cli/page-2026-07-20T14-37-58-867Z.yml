    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is West Elm Modern interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: "West Elm Modern-inspired design combines current urban practicality with a softened mid-century vocabulary: raised furniture, warm walnut, rounded geometry, saturated upholstery and sculptural light. It is less about reproducing a historical room than using visually light forms to make a city apartment feel composed and expressive. This independent guide is not affiliated with or endorsed by West Elm."
        - paragraph [ref=e88]: The successful version depends on editing. Pick one saturated textile, one dominant wood and one pale mineral surface, then repeat each with restraint. Check veneer direction and edge quality, upholstery wear, table clearances and the glare from exposed globes before buying. A few well-proportioned pieces leave more useful negative space than a collection of small “statement” objects.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Design from the aisle inward
          - paragraph [ref=e92]: Reserve a clear route through the apartment first, then fit seating, tables and storage into the remaining usable zones.
        - generic [ref=e93]:
          - generic [ref=e94]: Inspect veneer at the edge
          - paragraph [ref=e95]: Aligned grain can look rich, but edge treatment, substrate, finish and repair options determine how the piece will age.
        - generic [ref=e96]:
          - generic [ref=e97]: Place color by area
          - paragraph [ref=e98]: Let one chair, banquette or headboard carry the saturated tone; repeat it only in two much smaller moments.
