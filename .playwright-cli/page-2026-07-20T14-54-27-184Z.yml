    - generic [ref=e84]:
      - generic [ref=e85]:
        - heading "What is Elven Fantasy interior design?" [level=2] [ref=e86]
        - paragraph [ref=e87]: Elven Fantasy interior design is an imaginative, nature-led language rather than a historical style. Slender arches, branching lattices, pale timber, mineral walls and filtered landscape views suggest an ethereal woodland culture without requiring characters, heraldry or replicas from an existing fictional world. The strongest rooms feel like original architecture, not a film set.
        - paragraph [ref=e88]: Translate the idea into buildable layers. Curved ribs can be laminated or steam-bent by a qualified fabricator; botanical relief can stay shallow enough to clean; lime plaster and slate need assemblies suited to the actual climate. Keep kitchens, bathrooms, glazing, wiring and circulation fully contemporary. One crafted gesture per view is more convincing—and more maintainable—than vines, faux roots and symbols on every surface.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Choose an abstraction level
          - paragraph [ref=e92]: Decide whether the woodland appears through silhouette, material or carving, then stop before all three compete at full intensity.
        - generic [ref=e93]:
          - generic [ref=e94]: Mock up the curve
          - paragraph [ref=e95]: Test one full-size rib, junction and finish sample so radius, grain, shadow and fixing strategy can be judged together.
        - generic [ref=e96]:
          - generic [ref=e97]: Keep the envelope real
          - paragraph [ref=e98]: Custom-shaped windows still require tested glazing, drainage, structure, insulation and safe cleaning access.
